name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PICO_SDK_VERSION: 2.2.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install Pico SDK
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} https://github.com/raspberrypi/pico-sdk.git /tmp/pico-sdk
          cd /tmp/pico-sdk && git submodule update --init lib/tinyusb lib/mbedtls lib/lwip lib/btstack lib/cyw43-driver

      - name: Build
        run: |
          mkdir build && cd build
          cmake -G Ninja -DPICO_SDK_PATH=/tmp/pico-sdk ..
          ninja
        env:
          CI_BUILD: 1

      - name: Run unit tests
        run: cd build && ninja host_tests

      - name: Run integration tests
        run: cd build && ninja integration_tests

      - name: Run closed-loop tests
        run: cd build && ninja closedloop_tests

      - name: Validate web JS syntax
        run: node --check www/app.js

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyro-mk1b-v${{ steps.ver.outputs.version }}
          path: |
            build/pyro_fw_c.uf2
            build/pyro_fw_c.bin
            build/pyro_fw_c_fota_image.bin
            build/_deps/pico_fota_bootloader-build/pico_fota_bootloader.uf2
            VERSION
            www/
            support/install.py
            support/upload_www.sh
            support/upload_fw.sh
            support/flash_picotool.sh
            support/update_from_release.py
            support/test_network.py
            support/README.md
