name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PICO_SDK_VERSION: 2.2.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install Pico SDK
        run: |
          git clone --depth 1 --branch ${{ env.PICO_SDK_VERSION }} https://github.com/raspberrypi/pico-sdk.git /tmp/pico-sdk
          cd /tmp/pico-sdk && git submodule update --init lib/tinyusb lib/mbedtls lib/lwip lib/btstack lib/cyw43-driver

      - name: Build
        run: |
          mkdir build && cd build
          cmake -G Ninja -DPICO_SDK_PATH=/tmp/pico-sdk ..
          ninja
        env:
          CI_BUILD: 1

      - name: Run unit tests
        run: cd build && ninja host_tests

      - name: Run integration tests
        run: cd build && ninja integration_tests

      - name: Run closed-loop tests
        run: cd build && ninja closedloop_tests

      - name: Validate web JS syntax
        run: node --check www/app.js

      - name: Install Playwright
        run: |
          cd test/web
          npm install
          npx playwright install --with-deps chromium

      - name: Web UI tests
        run: |
          cd test/web
          for MODE in new configured flown; do
            echo "=== Testing mode: $MODE ==="
            node mock_server.js $MODE 3456 &
            PID=$!
            sleep 2
            # Verify server is up
            curl -s http://localhost:3456/api/status | head -c 100
            echo ""
            PYRO_MODE=$MODE BASE_URL=http://localhost:3456 npx playwright test --reporter=list 2>&1
            RESULT=$?
            kill $PID 2>/dev/null; wait $PID 2>/dev/null || true
            sleep 1
            if [ $RESULT -ne 0 ]; then exit $RESULT; fi
          done

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test/web/test-results/
            test/web/playwright-report/

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyro-mk1b-v${{ steps.ver.outputs.version }}
          path: |
            build/pyro_fw_c.uf2
            build/pyro_fw_c.bin
            build/pyro_fw_c_fota_image.bin
            build/_deps/pico_fota_bootloader-build/pico_fota_bootloader.uf2
            VERSION
            www/
            support/install.py
            support/upload_www.sh
            support/upload_fw.sh
            support/flash_picotool.sh
            support/update_from_release.py
            support/test_network.py
            support/README.md
